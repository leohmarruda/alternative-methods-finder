<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OpenRouter Chat</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 600px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .container textarea,
        .container button {
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            resize: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .response {
            margin-top: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Method Finder</h1>

    <textarea id="prompt" placeholder="Which testing method will you use?"></textarea>

    <button onclick="sendPrompt()">Send</button>

    <div class="loading" id="loading">Loading...</div>

    <div class="response" id="response"></div>
</div>

<script>
    async function sendPrompt() {
        const prompt = document.getElementById("prompt").value;
        const responseDiv = document.getElementById("response");
        const loading = document.getElementById("loading");

        responseDiv.innerText = "";
        loading.style.display = "block";

        try {
            const res = await fetch("/openrouter", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ prompt })
            });

            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }

            const text = await res.text();
            responseDiv.innerText = text;
        } catch (err) {
            responseDiv.innerText = "Erro ao chamar API";
        }

        loading.style.display = "none";
    }
</script>

</body>
</html>
