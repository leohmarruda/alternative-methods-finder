<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OpenRouter Chat</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 600px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .container textarea,
        .container button {
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 16px;
        }

        .mode-segment {
            display: flex;
            width: 100%;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
            background: #0f172a;
        }

        .mode-segment label {
            flex: 1;
            margin: 0;
            display: flex;
            cursor: pointer;
            font-size: 12px;
            color: #94a3b8;
            border-right: 1px solid #334155;
            user-select: none;
        }

        .mode-segment label:last-child {
            border-right: none;
        }

        .mode-segment input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .mode-segment input:focus-visible + span {
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
        }

        .mode-segment label span {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 6px;
            transition: background 0.15s, color 0.15s;
        }

        .mode-segment input:checked + span {
            background: #334155;
            color: #f8fafc;
            font-weight: 600;
        }

        .mode-segment label:hover input:not(:checked) + span {
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            resize: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .response {
            margin-top: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .response--plain {
            white-space: pre-wrap;
        }

        .response--md {
            white-space: normal;
            overflow-x: auto;
        }

        .response--md :first-child {
            margin-top: 0;
        }

        .response--md :last-child {
            margin-bottom: 0;
        }

        .response--md h1 {
            font-size: 1.35rem;
            margin: 0 0 0.75rem;
            font-weight: 700;
        }

        .response--md h2 {
            font-size: 1.15rem;
            margin: 1.25rem 0 0.5rem;
            color: #f1f5f9;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.35rem;
        }

        .response--md h3 {
            font-size: 1rem;
            margin: 1rem 0 0.5rem;
            color: #cbd5e1;
        }

        .response--md hr {
            border: none;
            border-top: 1px solid #334155;
            margin: 1rem 0;
        }

        .response--md table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.75rem 0;
            font-size: 12px;
        }

        .response--md th,
        .response--md td {
            border: 1px solid #334155;
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }

        .response--md th {
            background: #1e293b;
            color: #e2e8f0;
        }

        .response--md tr:nth-child(even) td {
            background: rgba(30, 41, 59, 0.45);
        }

        .response--md blockquote {
            margin: 0.75rem 0;
            padding: 0.5rem 0 0.5rem 1rem;
            border-left: 4px solid #3b82f6;
            color: #cbd5e1;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 0 6px 6px 0;
        }

        .response--md a {
            color: #60a5fa;
        }

        .response--md a:hover {
            text-decoration: underline;
        }

        .response--md p {
            margin: 0.5rem 0;
        }

        .loading {
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Method Finder</h1>

    <div class="mode-segment" role="radiogroup" aria-label="Run mode">
        <label>
            <input type="radio" name="runMode" value="mock">
            <span>Mock</span>
        </label>
        <label>
            <input type="radio" name="runMode" value="test" checked>
            <span>Test mode</span>
        </label>
        <label>
            <input type="radio" name="runMode" value="production">
            <span>Production mode</span>
        </label>
    </div>

    <textarea id="prompt" placeholder="Which testing method will you use?"></textarea>

    <button onclick="sendPrompt()">Send</button>

    <div class="loading" id="loading">Loading...</div>

    <div class="response response--plain" id="response"></div>
</div>

<script>
    function selectedModelKey() {
        const el = document.querySelector('input[name="runMode"]:checked');
        return el ? el.value : "test";
    }

    async function sendPrompt() {
        const prompt = document.getElementById("prompt").value;
        const responseDiv = document.getElementById("response");
        const loading = document.getElementById("loading");

        responseDiv.textContent = "";
        responseDiv.className = "response response--plain";
        loading.style.display = "block";

        try {
            const res = await fetch("/openrouter", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ prompt, model: selectedModelKey() })
            });

            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }

            const ct = (res.headers.get("content-type") || "").toLowerCase();
            const body = await res.text();
            if (ct.includes("text/html")) {
                responseDiv.className = "response response--md";
                responseDiv.innerHTML = body;
            } else {
                responseDiv.className = "response response--plain";
                responseDiv.textContent = body;
            }
        } catch (err) {
            responseDiv.className = "response response--plain";
            responseDiv.textContent = "Erro ao chamar API";
        }

        loading.style.display = "none";
    }
</script>

</body>
</html>
